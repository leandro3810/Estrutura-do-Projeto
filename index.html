{% extends 'Base.html' %}

{% block title %}Weather Dashboard{% endblock %}

{% block content %}
<div class="container">
    <div class="card">
        <h2>Weather Dashboard</h2>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter City (e.g. London)" value="London" aria-label="City name">
            <button onclick="getWeather()">Search</button>
        </div>

        <div id="weatherResult" class="weather-info">
            <h1 id="cityName">--</h1>
            <p id="description">Loading...</p>
            <div class="temp-container">
                <span id="temperature">--</span>°C
            </div>
            <div class="details">
                <div class="col">
                    <p>Wind Speed</p>
                    <p id="windSpeed">-- km/h</p>
                </div>
                <div class="col">
                    <p>Humidity</p>
                    <p id="humidity">--%</p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
{% endblock %}
