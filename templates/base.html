<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Estrutura-do-Projeto{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="{{ url_for('main.home') }}">Home</a>
        <a href="{{ url_for('main.about') }}">Sobre</a>
    </nav>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <p>Estrutura-do-Projeto · Flask + TypeScript + automação com agente de IA local</p>
    </footer>
    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/clock.js') }}" defer></script>
</body>
</html>
